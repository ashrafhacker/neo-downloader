<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>neo // Setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',-apple-system,sans-serif;
  background:#08080e;color:#e0e0f0;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:40px 40px;
}
.glow{
  position:fixed;top:-30%;left:-20%;width:80%;height:80%;
  background:radial-gradient(circle,rgba(124,58,237,.06) 0%,transparent 70%);
  pointer-events:none;
}
.glow2{
  position:fixed;bottom:-30%;right:-20%;width:80%;height:80%;
  background:radial-gradient(circle,rgba(59,130,246,.04) 0%,transparent 70%);
  pointer-events:none;
}
.login-card{
  position:relative;z-index:1;width:100%;max-width:400px;padding:32px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
  border-radius:20px;backdrop-filter:blur(16px);
  box-shadow:0 24px 80px rgba(0,0,0,.4);
}
.logo{
  display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:4px;
  font-size:1.2rem;font-weight:800;letter-spacing:-.3px;
}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff}
h1{font-size:1.1rem;font-weight:700;text-align:center;margin-bottom:3px}
.sub{font-size:.72rem;color:#555;text-align:center;margin-bottom:24px}
.input-group{display:flex;flex-direction:column;gap:4px;margin-bottom:16px}
.input-group label{font-size:.68rem;color:#666;font-weight:500;letter-spacing:.3px}
.input-group input{
  padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.02);color:#e0e0f0;font-size:.85rem;outline:none;
  font-family:inherit;transition:all .2s;
}
.input-group input:focus{border-color:rgba(124,58,237,.3);box-shadow:0 0 30px rgba(124,58,237,.04)}
.input-group input::placeholder{color:#444}
.login-btn{
  width:100%;padding:12px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff;
  font-weight:700;font-size:.85rem;cursor:pointer;font-family:inherit;
  transition:all .2s;margin-top:4px;
}
.login-btn:hover{filter:brightness(1.1);box-shadow:0 4px 25px rgba(124,58,237,.2)}
.login-btn:disabled{opacity:.3;cursor:not-allowed;filter:none;box-shadow:none}
.error{
  display:none;padding:8px 12px;border-radius:8px;font-size:.72rem;
  background:rgba(255,50,50,.06);border:1px solid rgba(255,50,50,.1);
  color:#ff5252;margin-bottom:12px;text-align:center;
}
.error.show{display:block}
.hint{font-size:.66rem;color:#444;text-align:center;margin-top:14px;line-height:1.5}
.footer{text-align:center;margin-top:16px;font-size:.6rem;color:#333}
.footer a{color:#555;text-decoration:none}
.footer a:hover{color:#7c3aed}
</style>
</head>
<body>
<div class="glow"></div><div class="glow2"></div>

<div class="login-card">
  <div class="logo">
    <div class="logo-icon">&#9881;</div>
    <span>neo<span style="color:#7c3aed">.</span></span>
  </div>
  <h1>Admin Setup Required</h1>
  <p class="sub">No admin password is configured on this deployment.</p>

  <div class="error {% if error %}show{% endif %}" id="errorBox">{{ error or '' }}</div>

  <form method="POST" action="/admin/setup" id="setupForm">
    <div class="input-group">
      <label for="password">Set Master Password</label>
      <input type="password" id="password" name="password" placeholder="At least 4 characters" autofocus>
    </div>
    <div class="input-group">
      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" name="confirm" placeholder="Re-enter password">
    </div>
    <button type="submit" class="login-btn" id="setupBtn">&#128273; Create Admin Password</button>
  </form>

  <p class="hint">Set once and stored as a salted hash. You'll use this to unlock the dashboard on every visit.</p>

  <div class="footer">
    <a href="/">&#8592; Back to main page</a>
  </div>
</div>

<script>
document.getElementById('setupForm').onsubmit=function(e){
  const p=document.getElementById('password').value;
  const c=document.getElementById('confirm').value;
  const err=document.getElementById('errorBox');
  if(p.length<4){e.preventDefault();err.textContent='Password must be at least 4 characters';err.classList.add('show');return}
  if(p!==c){e.preventDefault();err.textContent='Passwords do not match';err.classList.add('show');return}
  document.getElementById('setupBtn').innerHTML='<span class="loading"></span> Saving...';
  document.getElementById('setupBtn').disabled=true;
};
</script>
</body>
</html>
